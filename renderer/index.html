<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pi-hole DNS Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Connection Bar ──────────────────────────────────── -->
  <header class="connection-bar">
    <div class="conn-field">
      <label for="url-input">Pi-hole URL</label>
      <input type="text" id="url-input" value="http://pi.hole"
             placeholder="http://pi.hole" spellcheck="false" autocomplete="off">
    </div>
    <div class="conn-field">
      <label for="pw-input">Password</label>
      <input type="password" id="pw-input" placeholder="Pi-hole password" autocomplete="off">
    </div>
    <label class="ssl-check" title="Disable TLS certificate verification (for self-signed certs)">
      <input type="checkbox" id="skip-ssl" checked>
      <span>Skip SSL verify</span>
    </label>
    <button id="connect-btn" class="btn btn-primary">Connect</button>
    <button id="forget-btn" class="btn btn-ghost btn-sm" hidden title="Remove saved credentials">Forget</button>
  </header>

  <!-- ── Main Content ────────────────────────────────────── -->
  <main class="main">

    <!-- Tab Bar -->
    <div class="tab-bar">
      <button class="tab active" data-tab="a">A Records</button>
      <button class="tab" data-tab="cname">CNAME Records</button>
      <div class="tab-spacer"></div>
      <button id="refresh-btn" class="btn btn-ghost btn-sm" disabled>&#x21BB; Refresh</button>
    </div>

    <!-- A Records Panel -->
    <div class="panel active" id="panel-a">
      <div class="panel-toolbar">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="18" y2="18"/></svg>
          <input type="text" id="a-search" class="search-input" placeholder="Filter A records…" spellcheck="false" autocomplete="off" disabled>
        </div>
        <span class="record-count" id="a-count"></span>
      </div>
      <div class="table-wrap">
        <table class="records-table">
          <thead>
            <tr>
              <th>Hostname</th>
              <th>IP Address</th>
              <th class="col-action"></th>
            </tr>
          </thead>
          <tbody id="a-tbody"></tbody>
        </table>
        <div class="empty-state" id="a-empty">No A records found.</div>
        <div class="loading" id="a-loading" hidden>
          <div class="spinner"></div>
          <span>Loading&hellip;</span>
        </div>
      </div>

      <div class="add-form">
        <h3 class="form-title">Add A Record</h3>
        <div class="form-row">
          <div class="field">
            <label for="a-hostname">Hostname</label>
            <input type="text" id="a-hostname" placeholder="server.home.lan"
                   spellcheck="false" autocomplete="off">
          </div>
          <div class="field">
            <label for="a-ip">IP Address</label>
            <input type="text" id="a-ip" placeholder="192.168.1.10"
                   spellcheck="false" autocomplete="off">
          </div>
          <button class="btn btn-primary" id="a-add-btn" disabled>Add</button>
        </div>
      </div>
    </div>

    <!-- CNAME Records Panel -->
    <div class="panel" id="panel-cname">
      <div class="panel-toolbar">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="18" y2="18"/></svg>
          <input type="text" id="cname-search" class="search-input" placeholder="Filter CNAME records…" spellcheck="false" autocomplete="off" disabled>
        </div>
        <span class="record-count" id="cname-count"></span>
      </div>
      <div class="table-wrap">
        <table class="records-table">
          <thead>
            <tr>
              <th>Alias</th>
              <th>Target (A Record)</th>
              <th class="col-action"></th>
            </tr>
          </thead>
          <tbody id="cname-tbody"></tbody>
        </table>
        <div class="empty-state" id="cname-empty">No CNAME records found.</div>
        <div class="loading" id="cname-loading" hidden>
          <div class="spinner"></div>
          <span>Loading&hellip;</span>
        </div>
      </div>

      <div class="add-form">
        <h3 class="form-title">Add CNAME Record</h3>
        <div class="form-row">
          <div class="field">
            <label for="cname-alias">Alias</label>
            <input type="text" id="cname-alias" placeholder="www.home.lan"
                   spellcheck="false" autocomplete="off">
          </div>
          <div class="field">
            <label for="cname-target">Target</label>
            <select id="cname-target">
              <option value="">&#x2014; select A record &#x2014;</option>
            </select>
          </div>
          <button class="btn btn-primary" id="cname-add-btn" disabled>Add</button>
        </div>
      </div>
    </div>

  </main>

  <!-- ── Status Bar ───────────────────────────────────────── -->
  <footer class="status-bar">
    <span class="status-dot" id="status-dot" data-state="idle"></span>
    <span id="status-text">Not connected</span>
  </footer>

  <!-- ── Toast Container ──────────────────────────────────── -->
  <div class="toast-container" id="toast-container"></div>

  <script src="renderer.js"></script>
</body>
</html>
